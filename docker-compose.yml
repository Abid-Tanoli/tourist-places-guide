services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb+srv://visionaryabidi_db_user:%40Tanoli1369@cluster0.vbw7qa7.mongodb.net/tourist_guide_db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - USER_CLIENT_URL=${USER_CLIENT_URL:-http://localhost:5173}
      - ADMIN_CLIENT_URL=${ADMIN_CLIENT_URL:-http://localhost:5174}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - NODE_ENV=production
    restart: unless-stopped

  user-frontend:
    build:
      context: ./Frontend/User
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  admin-frontend:
    build:
      context: ./Frontend/Admin
      dockerfile: Dockerfile
    ports:
      - "5174:80"
    depends_on:
      - backend
